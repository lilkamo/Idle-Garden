      h+='<div class="tier-bonus">'+ic('sparkle',13)+'Chapter bonus: '+rewardLabel(t.bonus)+(done?' · earned':'')+'</div>';
      t.quests.forEach(q=>{
        const cur=questCur(q), goal=questGoal(q), comp=questComplete(q), claimed=questClaimed(q), pct=Math.min(100,cur/goal*100);
        h+='<div class="quest-card'+(claimed?' claimed':comp?' complete':'')+'">';
        h+='<div class="quest-top"><div><div class="quest-name">'+q.name+'</div><div class="quest-desc">'+q.desc+'</div></div><div class="quest-reward-tag">'+ic(REWARD_ICON[q.reward.type]||'sparkle',11)+rewardLabel(q)+'</div></div>';
        h+='<div class="qbar"><div class="qbar-fill'+(comp?' done':'')+'" style="width:'+pct+'%"></div></div>';
        h+='<div class="qprog"><span>'+fmt(cur)+' / '+fmt(goal)+'</span><span>'+Math.floor(pct)+'%</span></div>';
        if(claimed) h+='<button class="quest-claim claimedbtn" disabled>'+ic('check',13)+' Claimed</button>';
        else if(comp) h+='<button class="quest-claim" data-claimq="'+q.id+'">Claim reward</button>';
        h+='</div>';
      });
      h+='</div>';
    }
    h+='</div>';
  });
  host.innerHTML=h;
  host.querySelectorAll('[data-tier]').forEach(b=>b.onclick=()=>toggleQuestTier(+b.dataset.tier));
  host.querySelectorAll('[data-claimq]').forEach(b=>b.onclick=()=>claimQuest(b.dataset.claimq));
}
function renderDecor(){ const layer=document.getElementById('decorLayer'); if(!layer) return; let h=''; DECOR.forEach(d=>{ if(state.decor[d.id]&&DECOR_POS[d.id]){ const pos=DECOR_POS[d.id]; let style=''; for(const k in pos) style+=k+':'+pos[k]+';'; h+='<div class="decor-item" style="'+style+'">'+ic(d.icon,46)+'</div>'; } }); layer.innerHTML=h; }

/* ================= BUTTERFLY ================= */
function spawnButterfly(){ if(currentTab!=='garden') return; const view=document.getElementById('gardenView'); if(!view||view.querySelectorAll('.butterfly').length>=2) return; const b=document.createElement('div'); b.className='butterfly'; b.innerHTML='<svg viewBox="0 0 24 24">'+ICON_INNER.butterfly+'</svg>'; const x=10+Math.random()*70, y=30+Math.random()*40; b.style.left=x+'%'; b.style.top=y+'%'; b.style.transition='transform 3s ease-in-out'; view.appendChild(b); let moves=0; const fly=()=>{ if(!b.isConnected) return; b.style.transform='translate('+(Math.random()*60-30)+'px,'+(Math.random()*60-30)+'px)'; if(++moves<6) setTimeout(fly,2600); else b.remove(); }; setTimeout(fly,60); b.onclick=e=>{ const reward=Math.floor(Math.max(50,estimateIncomePerSec()*60)); addCoins(reward); state.butterfliesCaught++; floatPop(e,'+'+fmt(reward),'coin'); b.remove(); renderHeader(); }; setTimeout(()=>{ if(b.isConnected) b.remove(); },17000); }

/* ================= AGGREGATE RENDER ================= */
function renderAll(){ renderHeader(); renderGarden(); renderGreenhouse(); renderOrchard(); renderMarket(); renderQuests(); renderShop(); renderJournal(); renderDecor(); buildTabs(); }
function refreshActive(){
  renderHeader();
  if(currentTab==='garden') updateGrid('garden');
  else if(currentTab==='greenhouse'&&state.built.greenhouse){ updateGrid('gh_bed'); updateGrid('gh_pole'); }
  else if(currentTab==='orchard'&&state.built.orchard) updateGrid('orchard');
  if(currentTab==='garden') updateActions('garden');
  if(currentTab==='garden'||currentTab==='greenhouse'||currentTab==='orchard') renderFestivalBanner();
  updateMissionPill();
}

/* ================= MODALS ================= */
const modalBg=document.getElementById('modalBg'), modalEl=document.getElementById('modal');
function openModal(html){ modalEl.innerHTML='<button class="modal-close" id="mClose">&times;</button>'+html; modalBg.classList.add('active'); const c=document.getElementById('mClose'); if(c) c.onclick=closeModal; }
function closeModal(){ modalBg.classList.remove('active'); }
modalBg.addEventListener('click',e=>{ if(e.target===modalBg) closeModal(); });

function confirmCompost(){ const gain=compostGain(); openModal('<div class="modal-title">Compost the garden?</div><div class="modal-sub">a fresh start, with rewards</div><p>You\'ll receive <b>+'+gain+' compost points</b> to spend on permanent heritage perks.</p><ul><li><b>Reset:</b> coins, beds, pots, upgrades &amp; helpers</li><li><b>Kept:</b> perks, decor, gardener, built areas, mastery &amp; achievements</li></ul><div class="modal-actions"><button id="cCancel">Not yet</button><button class="primary" id="cGo">Compost (+'+gain+')</button></div>'); document.getElementById('cCancel').onclick=closeModal; document.getElementById('cGo').onclick=doCompost; }

function openMenu(){ let tips=''; TIPS.forEach(t=>tips+='<li><b>'+t[0]+'.</b> '+t[1]+'</li>'); const recover=hasLocalBackup()?'<button id="mRecover">Recover last save</button>':'';
  let themeBtns=''; THEMES.forEach(th=>themeBtns+='<button data-theme="'+th.id+'" class="'+((state.theme||'garden')===th.id?'active':'')+'">'+th.name+'</button>');
  const daily=dailyAvailable()?'<div class="modal-actions"><button class="primary" id="mDaily">'+ic('gift',14)+' Claim daily reward (streak '+state.daily.streak+')</button></div>':'';
  openModal('<div class="modal-title">Idle Garden</div><div class="modal-sub">settings &amp; how it works</div>'+
    daily+
    '<div class="section-label" style="margin-top:6px">'+ic('pencil',16)+'Garden name</div>'+
    '<div class="modal-actions"><input id="mName" maxlength="28" placeholder="My Garden" value="'+esc(state.gardenName)+'" style="flex:1;padding:11px;border:1.5px solid var(--line);border-radius:var(--r-md);font-family:inherit;font-size:14px;background:var(--cream);color:var(--ink)"><button class="primary" id="mNameSave">Save</button></div>'+
    '<div class="section-label">'+ic('palette',16)+'Theme</div><div class="theme-row" id="mThemes">'+themeBtns+'</div>'+
    '<div class="section-label">'+ic(state.sound?'note':'mute',16)+'Sound</div><div class="modal-actions"><button id="mSound">'+(state.sound?'Sound is ON — tap to mute':'Sound is OFF — tap to enable')+'</button></div>'+
    '<div class="section-label">'+ic('info',16)+'Tips</div><ul>'+tips+'</ul>'+
    '<p class="small">Your garden saves automatically on this device. <b>Back up</b> a code now and again (Notes, email) — you can <b>Restore</b> it on any device.</p>'+
    '<div class="modal-actions"><button id="mBackup">Back up</button><button id="mRestore">Restore</button></div>'+
    '<div class="modal-actions">'+recover+'<button id="mReset" class="danger">Reset</button><button class="primary" id="mOk">Got it</button></div>');
  document.getElementById('mOk').onclick=closeModal;
  document.getElementById('mBackup').onclick=openExportModal;
  document.getElementById('mRestore').onclick=openImportModal;
  document.getElementById('mNameSave').onclick=()=>{ setGardenName(document.getElementById('mName').value); toast('Garden named','good'); openMenu(); };
  document.getElementById('mThemes').querySelectorAll('[data-theme]').forEach(b=>b.onclick=()=>{ setTheme(b.dataset.theme); openMenu(); });
  document.getElementById('mSound').onclick=()=>{ toggleSound(); openMenu(); };
  const md=document.getElementById('mDaily'); if(md) md.onclick=()=>{ const r=claimDaily(); closeModal(); if(r){ renderHeader(); buildTabs(); openModal('<div class="modal-title">Daily reward</div><div class="modal-sub">day '+r.streak+' streak</div><p>You collected <b>'+ic('coin',14)+' '+fmt(r.coins)+' coins</b>'+r.extra+'. Come back tomorrow to grow your streak!</p><div class="modal-actions"><button class="primary" id="dOk">Lovely</button></div>'); document.getElementById('dOk').onclick=closeModal; } };
  const rc=document.getElementById('mRecover'); if(rc) rc.onclick=()=>{ openModal('<div class="modal-title">Recover last save?</div><p>This restores the most recent backup kept on this device and reloads the game.</p><div class="modal-actions"><button id="rcNo">Cancel</button><button class="primary" id="rcYes">Recover</button></div>'); document.getElementById('rcNo').onclick=closeModal; document.getElementById('rcYes').onclick=recoverBackup; };
  document.getElementById('mReset').onclick=()=>{ openModal('<div class="modal-title">Reset everything?</div><p>This permanently deletes your garden and starts over. Consider tapping <b>Back up</b> first. This cannot be undone.</p><div class="modal-actions"><button id="rNo">Cancel</button><button class="danger" id="rYes">Delete &amp; restart</button></div>'); document.getElementById('rNo').onclick=closeModal; document.getElementById('rYes').onclick=()=>{ try{localStorage.removeItem(SAVE_KEY);}catch(e){} location.reload(); }; };
}
function openExportModal(){ save(); const code=exportSave(); openModal('<div class="modal-title">Back up your garden</div><div class="modal-sub">keep this code safe</div><p class="small">Copy this and paste it somewhere safe. Paste it into Restore to bring your garden back on any device, or if storage ever gets cleared.</p><textarea id="exCode" readonly style="width:100%;height:120px;border:1.5px solid var(--line);border-radius:12px;padding:10px;font-family:monospace;font-size:11px;resize:none;background:var(--cream)">'+code+'</textarea><div class="modal-actions"><button id="exCopy" class="primary">Copy code</button><button id="exClose">Close</button></div>'); const ta=document.getElementById('exCode'); document.getElementById('exClose').onclick=closeModal; document.getElementById('exCopy').onclick=()=>{ try{ ta.select(); ta.setSelectionRange(0,99999); }catch(e){} let ok=false; try{ ok=document.execCommand('copy'); }catch(e){} if(navigator.clipboard){ navigator.clipboard.writeText(code).then(()=>toast('Backup code copied','good')).catch(()=>{}); ok=true; } toast(ok?'Backup code copied':'Select the code and copy it', ok?'good':undefined); }; }
function openImportModal(){ openModal('<div class="modal-title">Restore a garden</div><div class="modal-sub">paste a backup code</div><p class="small">This replaces whatever is on this device with the backed-up garden.</p><textarea id="imCode" placeholder="Paste your backup code here" style="width:100%;height:120px;border:1.5px solid var(--line);border-radius:12px;padding:10px;font-family:monospace;font-size:11px;resize:none;background:var(--cream)"></textarea><div class="modal-actions"><button id="imCancel">Cancel</button><button id="imGo" class="primary">Restore</button></div>'); document.getElementById('imCancel').onclick=closeModal; document.getElementById('imGo').onclick=()=>{ const code=document.getElementById('imCode').value; if(!code.trim()){ toast('Paste a code first'); return; } if(importCode(code)){ toast('Restored! Reloading…','good'); setTimeout(()=>location.reload(),600); } else { toast('Couldn\'t read that code — paste the whole thing exactly, with no extra text'); } }; }

function openWeatherInfo(){ const S=SEASONS[seasonIndex()],W=WEATHERS[weatherKey()]; const nextSeason=SEASON_LEN-(state.clock%SEASON_LEN);
  const festLine = festivalActive() ? '<p>'+ic(currentFestival().icon,16)+' <b>'+currentFestival().name+'</b> is live for '+fmtTime(festivalTimeLeft())+' — '+currentFestival().blurb+'.</p>' : '<p class="small">'+upcomingFestival().name+' opens in '+fmtTime(nextFestivalIn())+'.</p>';
  const rareLine = W.rare ? '<p>'+ic('sparkle',16)+' A rare '+W.name+' — a big boost while it lasts!</p>' : '';
  openModal('<div class="modal-title">'+S.name+' · '+W.name+'</div><div class="modal-sub">'+S.note+'</div>'+rareLine+'<p>'+ic(W.icon,16)+' <b>'+W.name+'</b> — '+(W.water?'rain is topping up your water. ':'')+(W.poll>1?'wind is boosting pollination. ':'')+(W.g>1?'growth is faster. ':W.g<1?'growth is slowed. ':'steady conditions. ')+(W.y>1?'harvests are worth more. ':'')+'</p>'+festLine+'<p class="small">Next season in '+fmtTime(nextSeason)+'. The greenhouse is climate-controlled and ignores weather and winter.</p><div class="modal-actions"><button class="primary" id="wOk">Close</button></div>'); document.getElementById('wOk').onclick=closeModal; }

function welcomeModal(){ openModal('<div class="modal-title">Welcome to your garden</div><div class="modal-sub">a little plot to call your own</div><p>Tap a bed to plant a seed. Tap growing plants to water them, and tap again when they bloom to gather coins.</p><p>Earn enough and you can build a <b>greenhouse</b> for veg and a whole <b>orchard</b> of trees, hire a <b>gardener</b> to earn while you\'re away, fill <b>deliveries</b>, and ride the <b>seasons</b>.</p><div class="modal-actions"><button class="primary" id="wGo">Start growing</button></div>'); document.getElementById('wGo').onclick=closeModal; }

function offlineModal(info){ const g=GARDENERS[state.gardener]; let body; if(info.earned>0){ body='<p>Your garden ran itself for <b>'+fmtTime(info.elapsed)+'</b>.</p><div class="stats-grid" style="margin-bottom:8px"><div class="stat-box"><div class="stat-label">Coins banked</div><div class="stat-val">'+ic('coin',14)+' '+fmt(info.earned)+'</div></div><div class="stat-box"><div class="stat-label">Plants grown</div><div class="stat-val">'+fmt(info.grown||0)+'</div></div><div class="stat-box"><div class="stat-label">Gardener</div><div class="stat-val" style="font-size:14px">'+g.name+'</div></div><div class="stat-box"><div class="stat-label">Banking rate</div><div class="stat-val">'+Math.round((info.rate||0)*100)+'%</div></div></div>'+(state.gardener<GARDENERS.length-1?'<p class="small">A better gardener banks a bigger share while you are away.</p>':''); } else { body='<p>You were away for <b>'+fmtTime(info.elapsed)+'</b>. Your plants kept growing, but no-one was here to harvest them.</p><p>Hire a <b>gardener</b> in the Shop to bank coins while you\'re gone.</p>'; } openModal('<div class="modal-title">While you were away</div><div class="modal-sub">welcome back</div>'+body+'<div class="modal-actions"><button class="primary" id="oOk">Lovely</button></div>'); document.getElementById('oOk').onclick=closeModal; }

/* ================= TABS ================= */
let currentTab='garden';
const TABS=[ {key:'garden',icon:'flower',label:'Garden'}, {key:'greenhouse',icon:'greenhouse',label:'Greenhouse'}, {key:'orchard',icon:'tree',label:'Orchard'}, {key:'market',icon:'orders',label:'Market'}, {key:'quests',icon:'scroll',label:'Quests'}, {key:'shop',icon:'cart',label:'Shop'}, {key:'journal',icon:'book',label:'Journal'} ];
function readyDeliveries(){ return state.active.filter(a=>activeComplete(a)).length; }
function buildTabs(){ const nav=document.getElementById('tabs'); let h=''; TABS.forEach(t=>{ let bn=0; if(t.key==='market') bn=readyDeliveries(); else if(t.key==='quests') bn=claimableQuests(); const badge=bn>0?'<span class="tab-badge">'+bn+'</span>':''; h+='<button class="tab-btn'+(t.key===currentTab?' active':'')+'" data-tab="'+t.key+'">'+ic(t.icon,21)+'<span>'+t.label+'</span>'+badge+'</button>'; }); nav.innerHTML=h; nav.querySelectorAll('[data-tab]').forEach(b=>b.onclick=()=>switchTab(b.dataset.tab)); }
function switchTab(key){ currentTab=key; document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active')); const pn=document.getElementById('panel-'+key); if(pn) pn.classList.add('active'); document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active',b.dataset.tab===key)); if(key==='garden') renderGarden(); else if(key==='greenhouse') renderGreenhouse(); else if(key==='orchard') renderOrchard(); else if(key==='market') renderMarket(); else if(key==='quests') renderQuests(); else if(key==='shop') renderShop(); else if(key==='journal') renderJournal(); if(key==='garden'||key==='orchard') applyWeatherVisuals(); updateMissionPill(); document.getElementById('main').scrollTop=0; }

/* ================= WEATHER VISUALS ================= */
let _lastWx='';
function applyWeatherVisuals(){ const W=WEATHERS[weatherKey()]; [['wxGarden'],['wxOrchard']].forEach(([id])=>{ const el=document.getElementById(id); if(!el) return; el.className='wx-overlay'+(W.wx?' '+W.wx:''); if(W.wx) requestAnimationFrame(()=>el.classList.add('on')); }); }

/* ================= INIT + LOOP ================= */
function installHomeScreen(){ try{
  var al=document.querySelector('link[rel="apple-touch-icon"]'); if(!al){ al=document.createElement('link'); al.rel='apple-touch-icon'; document.head.appendChild(al);} al.setAttribute('sizes','512x512'); al.href=ICON_DATA;
  var ic2=document.createElement('link'); ic2.rel='icon'; ic2.type='image/png'; ic2.href=ICON_DATA; document.head.appendChild(ic2);
  var manifest={name:'Idle Garden',short_name:'Idle Garden',display:'standalone',orientation:'portrait',background_color:'#234034',theme_color:'#2d6a4f',icons:[{src:ICON_DATA,sizes:'192x192',type:'image/png',purpose:'any'},{src:ICON_DATA,sizes:'512x512',type:'image/png',purpose:'any'}]};
  var blob=new Blob([JSON.stringify(manifest)],{type:'application/manifest+json'}); var url=URL.createObjectURL(blob);
  var ml=document.querySelector('link[rel=manifest]'); if(!ml){ ml=document.createElement('link'); ml.rel='manifest'; document.head.appendChild(ml);} ml.href=url;
}catch(e){} }
function init(){
  const loaded=load();
  if(!loaded){ state=createNewState(); freshPlotsAll(); }
  let offline=null; if(loaded) offline=processOffline();
  document.getElementById('appTitle').innerHTML=ic('leaf',20)+'Idle <em>Garden</em>';
  document.getElementById('icCoin').innerHTML=ic('coin',22);
  document.getElementById('icWater').innerHTML=ic('water',22);
  document.getElementById('icCompost').innerHTML=ic('compost',22);
  document.getElementById('menuBtn').innerHTML=ic('menu',20);
  document.getElementById('menuBtn').onclick=openMenu;
  installHomeScreen();
  document.getElementById('missionPill').onclick=openMissionSheet;
  applyTheme();
  document.getElementById('seasonPill').onclick=openWeatherInfo;
  document.getElementById('weatherPill').onclick=openWeatherInfo;
  document.getElementById('gardenH').innerHTML=ic('flower',22)+(state.gardenName?esc(state.gardenName):'Flower Garden');
  document.getElementById('marketH').innerHTML=ic('orders',24)+'Market';
  document.getElementById('questsH').innerHTML=ic('scroll',24)+'Quests';
  document.getElementById('shopH').innerHTML=ic('cart',24)+'Shop';
  document.getElementById('journalH').innerHTML=ic('book',24)+'Journal';
  refillOffers();
  buildTabs(); renderAll(); switchTab('garden'); applyWeatherVisuals();
  checkAchievements();
  if(!state.seenWelcome){ welcomeModal(); state.seenWelcome=true; save(); }
  else if(offline&&offline.elapsed>=60) offlineModal(offline);
  else if(dailyAvailable()&&state.totalHarvested>0){ setTimeout(()=>{ const r=claimDaily(); if(r){ renderHeader(); buildTabs(); openModal('<div class="modal-title">Daily reward</div><div class="modal-sub">day '+r.streak+' streak</div><p>Welcome back! You collected <b>'+ic('coin',14)+' '+fmt(r.coins)+' coins</b>'+r.extra+'. Keep your streak going by visiting each day.</p><div class="modal-actions"><button class="primary" id="dOk2">Lovely</button></div>'); document.getElementById('dOk2').onclick=closeModal; } }, 500); }
  if(_hadBackup){ setTimeout(()=>{ openModal('<div class="modal-title">Couldn\'t read your old save</div><p>Your previous garden was in a format this version can\'t open, so it was kept as a backup rather than deleted. A fresh garden has started.</p><p class="small">If this was an older save it may not be restorable, but nothing was overwritten — tap Recover in the menu to try.</p><div class="modal-actions"><button class="primary" id="bkOk">OK</button></div>'); document.getElementById('bkOk').onclick=closeModal; }, 400); }
  setInterval(()=>{ tick(); const wk=weatherKey(); if(wk!==_lastWx){ _lastWx=wk; applyWeatherVisuals(); renderHeader(); } if(currentTab==='market') renderMarket(); if(currentTab==='shop'&&state.fertiliserActiveUntil>Date.now()) {} buildTabs(); }, 1000);
  setInterval(()=>{ refreshActive(); if(currentTab==='market') refreshMarketCountdowns(); }, 250);
  setInterval(spawnButterfly, 8500);
  setInterval(save, 15000);
  window.addEventListener('beforeunload', save);
  document.addEventListener('visibilitychange',()=>{ if(document.hidden) save(); else { const o=processOffline(); if(o&&o.earned>0){ renderHeader(); renderSectionTab(currentTab); } } });
}
if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',init); else init();
</script>
